<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Android Developer Portfolio - 이의태</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-card-hover: #1a1a1a;
            --accent: #6366f1;
            --accent-2: #818cf8;
            --accent-3: #a5b4fc;
            --gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
            --text: #f5f5f5;
            --text-2: #a0a0a0;
            --text-3: #666;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(99, 102, 241, 0.5);
            --glow: 0 8px 40px rgba(99, 102, 241, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
            font-size: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 36px;
        }

        .nav-link {
            color: var(--text-3);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-link:hover { color: var(--text); }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding: 80px 0;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .hero-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hero-tag::before {
            content: '';
            width: 40px;
            height: 2px;
            background: var(--gradient);
        }

        .hero-name {
            font-size: clamp(56px, 8vw, 88px);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -0.04em;
            margin-bottom: 16px;
        }

        .hero-role {
            font-size: clamp(24px, 3.5vw, 36px);
            font-weight: 300;
            color: var(--text-2);
            letter-spacing: -0.02em;
            margin-bottom: 36px;
        }

        .hero-desc {
            font-size: 18px;
            color: var(--text-2);
            line-height: 1.8;
            max-width: 640px;
            margin-bottom: 56px;
        }

        .hero-stats {
            display: flex;
            gap: 64px;
        }

        .h-stat {}

        .h-stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .h-stat-label {
            font-size: 14px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* Section */
        section {
            padding: 100px 0;
        }

        .section-header {
            margin-bottom: 56px;
        }

        .section-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-tag::before {
            content: '';
            width: 40px;
            height: 2px;
            background: var(--gradient);
        }

        .section-title {
            font-size: clamp(36px, 5vw, 52px);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
        }

        .section-desc {
            font-size: 18px;
            color: var(--text-2);
            max-width: 520px;
            line-height: 1.7;
        }

        /* Project Cards */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-6px);
            box-shadow: var(--glow);
            background: var(--bg-card-hover);
        }

        .card-top {
            padding: 28px 32px 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-icon { font-size: 36px; }

        .card-period {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
            padding: 6px 14px;
            border-radius: 24px;
            white-space: nowrap;
        }

        .card-body {
            padding: 0 32px 32px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .card-role {
            font-size: 14px;
            color: var(--accent-3);
            font-weight: 500;
            margin-bottom: 16px;
        }

        .card-desc {
            font-size: 15px;
            color: var(--text-2);
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .card-highlights {
            margin-bottom: 20px;
        }

        .card-highlights-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .card-highlight {
            display: flex;
            gap: 10px;
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.7;
            margin-bottom: 4px;
        }

        .card-highlight-dot {
            color: var(--accent);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .card-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-3);
            background: rgba(99, 102, 241, 0.08);
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .card-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .card-metric {
            background: rgba(99, 102, 241, 0.06);
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .card-metric-label {
            font-size: 11px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .card-metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }

        /* Skills */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .skill-card {
            padding: 28px;
        }

        .skill-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.01em;
        }

        .skill-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .skill-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .skill-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-2);
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .skill-badge:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(99, 102, 241, 0.06);
        }

        /* Contact */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            max-width: 800px;
        }

        .contact-card {
            padding: 40px 28px;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .contact-card:hover {
            transform: translateY(-6px);
        }

        .contact-emoji {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .contact-type {
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .contact-info {
            font-size: 16px;
            color: var(--text);
            font-weight: 500;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 40px 0;
            text-align: center;
        }

        .footer-text {
            font-size: 14px;
            color: var(--text-3);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 32px;
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Project Card Clickable */
        .card-clickable { cursor: pointer; }
        .card-clickable:active { transform: scale(0.98); }

        /* Detail Page */
        .detail-page {
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .detail-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-2);
            font-size: 15px;
            cursor: pointer;
            padding: 8px 0;
            transition: color 0.2s;
            background: none;
            border: none;
            font-family: inherit;
        }
        .detail-back:hover { color: var(--text); }

        .detail-hero {
            padding: 120px 0 60px;
            position: relative;
            overflow: hidden;
        }
        .detail-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.12;
            z-index: 0;
        }
        .detail-hero .container { position: relative; z-index: 1; }

        .detail-hero-top {
            display: flex;
            align-items: flex-start;
            gap: 40px;
            margin-top: 24px;
        }

        .detail-phone {
            flex-shrink: 0;
            width: 220px;
            height: 440px;
            border-radius: 32px;
            border: 3px solid rgba(255,255,255,0.15);
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .detail-phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 28px;
            background: #1a1a1a;
            border-radius: 0 0 18px 18px;
            z-index: 2;
        }
        .detail-phone-screen {
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            overflow: hidden;
        }
        .detail-phone-icon {
            font-size: 56px;
            z-index: 1;
        }
        .detail-phone-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            text-align: center;
            padding: 0 16px;
            z-index: 1;
        }
        .detail-phone-pattern {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.15;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.2) 0%, transparent 50%);
        }

        .detail-hero-info {
            flex: 1;
            padding-top: 8px;
        }
        .detail-hero-icon {
            font-size: 72px;
            margin-bottom: 16px;
        }
        .detail-hero-title {
            font-size: 36px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        .detail-hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        .detail-hero-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            color: var(--text-2);
        }
        .detail-hero-desc {
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-2);
            max-width: 600px;
        }

        .detail-section {
            padding: 60px 0;
        }
        .detail-section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .detail-section-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Overview Grid */
        .detail-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .detail-overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        .detail-overview-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .detail-overview-label {
            font-size: 13px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Highlights Grid */
        .detail-highlights {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .detail-highlight-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .detail-highlight-num {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .detail-highlight-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
        }

        /* Tech Badges */
        .detail-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .detail-tech-badge {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid;
            background: transparent;
        }

        /* Metrics */
        .detail-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .detail-metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        .detail-metric-value {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .detail-metric-label {
            font-size: 14px;
            color: var(--text-3);
        }

        /* Gallery */
        .detail-gallery {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .detail-gallery::-webkit-scrollbar { height: 4px; }
        .detail-gallery::-webkit-scrollbar-track { background: transparent; }
        .detail-gallery::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .detail-gallery-item {
            flex-shrink: 0;
            width: 140px;
            height: 240px;
            border-radius: 16px;
            border: 2px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
            transition: border-color 0.2s, transform 0.2s;
        }
        .detail-gallery-item:hover { transform: scale(1.03); }
        .detail-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Nav back link */
        .nav-back {
            color: var(--text-2);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
            background: none;
            border: none;
            font-family: inherit;
        }
        .nav-back:hover { color: var(--text); }

        /* Responsive */
        @media (max-width: 1024px) {
            .projects-grid { grid-template-columns: 1fr; max-width: 640px; }
            .hero-stats { gap: 48px; }
            .detail-hero-top { flex-direction: column; align-items: center; text-align: center; }
            .detail-hero-desc { max-width: 100%; }
            .detail-hero-meta { justify-content: center; }
            .detail-overview { grid-template-columns: repeat(2, 1fr); }
            .detail-highlights { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .container { padding: 0 24px; }
            .hero { min-height: auto; padding: 120px 0 80px; }
            .hero-stats { flex-wrap: wrap; gap: 32px; }
            .h-stat-value { font-size: 36px; }
            .skills-grid { grid-template-columns: repeat(2, 1fr); }
            .contact-grid { grid-template-columns: 1fr; max-width: 360px; }
            section { padding: 80px 0; }
            .detail-phone { width: 180px; height: 360px; }
            .detail-phone-icon { font-size: 44px; }
            .detail-hero-title { font-size: 28px; }
            .detail-overview { grid-template-columns: repeat(2, 1fr); }
            .detail-metrics { grid-template-columns: 1fr; }
            .detail-section { padding: 40px 0; }
            .detail-gallery-item { width: 120px; height: 200px; }
        }

        @media (max-width: 480px) {
            .hero-stats { gap: 24px; }
            .h-stat-value { font-size: 32px; }
            .skills-grid { grid-template-columns: 1fr; }
            .card-metrics { grid-template-columns: 1fr; }
            .card-body { padding: 0 24px 24px; }
            .card-top { padding: 24px 24px 12px; }
            .detail-phone { width: 160px; height: 320px; border-radius: 24px; }
            .detail-phone-notch { width: 80px; height: 22px; }
            .detail-hero-title { font-size: 24px; }
            .detail-overview { grid-template-columns: 1fr; }
            .detail-overview-value { font-size: 24px; }
            .detail-metric-value { font-size: 28px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useEffect, useState } = React;

    const projectGradients = [
        ['#7F7F7F', '#9E9E9E'],  // ShopOwner - WebView 셸 (Gray)
        ['#39A628', '#2E8520'],  // EasyShop - mainColor (Green)
        ['#6799FF', '#0288D1'],  // NestPay - light_blue (Blue)
        ['#CC0C6B', '#FF4081'],  // MatchKorea - mainColor + accent (Pink)
        ['#42C6CC', '#5D4CD8'],  // Samanda - mainColor + menuColor (Teal→Purple)
        ['#FA3942', '#212E3F'],  // Citame - color00 + color03 (Red→Navy)
        ['#F7971E', '#FFD200'],  // Isswa - 아이콘 기반 (Orange→Yellow)
    ];

    const ProjectDetail = ({ project, index, onBack }) => {
        const [c1, c2] = projectGradients[index];
        const grad = `linear-gradient(135deg, ${c1}, ${c2})`;
        const hasImages = project.images && project.images.length > 0;
        const [phoneImg, setPhoneImg] = useState(0);

        useEffect(() => {
            window.scrollTo(0, 0);
            setPhoneImg(0);
        }, [index]);

        return (
            <div className="detail-page">
                <div className="detail-hero" style={{background: `linear-gradient(135deg, ${c1}15, ${c2}08)`}}>
                    <div className="container">
                        <button className="detail-back" onClick={onBack}>← 프로젝트 목록으로</button>

                        <div className="detail-hero-top">
                            <div className="detail-phone">
                                <div className="detail-phone-notch"></div>
                                {hasImages ? (
                                    <div className="detail-phone-screen" style={{background: grad, cursor: project.images.length > 1 ? 'pointer' : 'default'}}
                                         onClick={() => project.images.length > 1 && setPhoneImg((phoneImg + 1) % project.images.length)}>
                                        <img src={project.images[phoneImg]} alt={project.title}
                                             style={{width: '100%', height: '100%', objectFit: 'contain', position: 'relative', zIndex: 1}} />
